{% if include.images %}
<div class="gallery">
  {% for image in include.images %}
  <figure class="gallery-item">
    <img src="{{ image.path }}" alt="{{ image.alt }}" loading="lazy">
    {% if image.caption %}
    <figcaption>{{ image.caption }}</figcaption>
    {% endif %}
  </figure>
  {% endfor %}
</div>

<div class="lightbox" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" aria-label="Close image viewer">
    <i class="fa-solid fa-xmark"></i>
  </button>
  <button class="lightbox-prev" aria-label="Previous image">
    <i class="fa-solid fa-chevron-left"></i>
  </button>
  <img class="lightbox-img" src="" alt="">
  <button class="lightbox-next" aria-label="Next image">
    <i class="fa-solid fa-chevron-right"></i>
  </button>
  <p class="lightbox-caption"></p>
</div>

<script>
(function () {
  var lightbox = document.getElementById('gallery-lightbox');
  if (!lightbox) return;

  var lightboxImg    = lightbox.querySelector('.lightbox-img');
  var lightboxCap    = lightbox.querySelector('.lightbox-caption');
  var closeBtn       = lightbox.querySelector('.lightbox-close');
  var prevBtn        = lightbox.querySelector('.lightbox-prev');
  var nextBtn        = lightbox.querySelector('.lightbox-next');
  var items          = Array.from(document.querySelectorAll('.gallery-item'));
  var currentIndex   = 0;

  function open(index) {
    currentIndex = index;
    update();
    lightbox.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function close() {
    lightbox.classList.remove('is-open');
    document.body.style.overflow = '';
  }

  function update() {
    var item       = items[currentIndex];
    var img        = item.querySelector('img');
    var figcaption = item.querySelector('figcaption');

    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;

    if (figcaption) {
      lightboxCap.textContent = figcaption.textContent;
      lightboxCap.hidden = false;
    } else {
      lightboxCap.hidden = true;
    }

    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === items.length - 1;
  }

  items.forEach(function (item, index) {
    item.addEventListener('click', function () { open(index); });
  });

  closeBtn.addEventListener('click', close);

  prevBtn.addEventListener('click', function () {
    if (currentIndex > 0) { currentIndex--; update(); }
  });

  nextBtn.addEventListener('click', function () {
    if (currentIndex < items.length - 1) { currentIndex++; update(); }
  });

  // Close when clicking the backdrop (not the image or controls)
  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('is-open')) return;
    if (e.key === 'Escape') { close(); return; }
    if (e.key === 'ArrowLeft'  && currentIndex > 0)                  { currentIndex--; update(); }
    if (e.key === 'ArrowRight' && currentIndex < items.length - 1)   { currentIndex++; update(); }
  });
})();
</script>
{% endif %}
